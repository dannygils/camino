name: Tally Votes

on:
  push:
    paths:
      - 'sleep/sleep.yaml'
      - 'packing/packing-list.yaml'

jobs:
  tally:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Tally accommodation votes
        run: python3 sleep/tally-sleep.py sleep/sleep.yaml > sleep/tally-results.md

      - name: Tally packing list
        run: python3 packing/tally-packing.py packing/packing-list.yaml > packing/packing-tally.md

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sleep/tally-results.md packing/packing-tally.md
          git diff --cached --quiet || git commit -m "tally: update results [skip ci]"
          git push
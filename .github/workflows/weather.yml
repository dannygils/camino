name: Weather Tracker

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday at 6am UTC
  workflow_dispatch:        # allow manual trigger anytime

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch weather and generate page
        run: python3 weather/fetch-weather.py

      - name: Commit updated weather page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/weather.html
          git diff --cached --quiet || git commit -m "weather: weekly update $(date -u '+%Y-%m-%d') [skip ci]"
          git push
